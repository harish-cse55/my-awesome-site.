<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Harish</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #030712; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .hidden-section { display: none; }
    </style>
</head>
<body class="min-h-screen p-6 flex items-center justify-center">

    <div id="login-section" class="glass p-8 rounded-3xl w-full max-w-md">
        <h1 class="text-2xl font-black mb-6 tracking-tight italic text-blue-500">Secure Access.</h1>
        <input type="email" id="email" placeholder="Email" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mb-4 text-white outline-none focus:border-blue-500">
        <input type="password" id="password" placeholder="Password" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mb-6 text-white outline-none focus:border-blue-500">
        <button id="login-btn" class="w-full bg-white text-black font-bold py-3 rounded-xl hover:bg-blue-500 hover:text-white transition">Enter Systems</button>
        <p id="error-msg" class="text-red-400 text-xs text-center mt-4"></p>
    </div>

    <div id="dashboard-section" class="hidden-section w-full max-w-5xl space-y-6">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black italic">Command Center<span class="text-blue-500">.</span></h1>
            <button id="logout-btn" class="text-xs font-bold text-gray-500 hover:text-white uppercase tracking-widest border border-gray-800 px-4 py-2 rounded-full transition">Logout</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass p-8 rounded-3xl">
                <h3 class="font-bold mb-4 text-blue-400">Live Status</h3>
                <input type="text" id="status-input" placeholder="Current Task..." class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mb-4 text-sm">
                <select id="status-color" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mb-4 text-sm">
                    <option value="green" class="text-black">Green (Active)</option>
                    <option value="orange" class="text-black">Orange (Away)</option>
                    <option value="red" class="text-black">Red (Busy)</option>
                </select>
                <button id="update-status-btn" class="w-full bg-blue-600 py-3 rounded-xl font-bold text-sm">Push Update</button>
            </div>

            <div class="glass p-8 rounded-3xl md:col-span-2">
                <h3 class="font-bold mb-4 text-indigo-400">New Journal Entry</h3>
                <input type="text" id="blog-title" placeholder="Title" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mb-4 font-bold">
                <textarea id="blog-content" rows="6" placeholder="Write in HTML or Text..." class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mb-4 font-mono text-sm"></textarea>
                <button id="publish-blog-btn" class="bg-white text-black px-8 py-3 rounded-xl font-bold hover:bg-indigo-500 hover:text-white transition">Publish Log</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIG (Ensure this matches your Firebase Project)
        const firebaseConfig = {
            apiKey: "AIzaSyCaeOpiB8z_jJ8m3gmfBiREJyqt2PaqdLQ",
            authDomain: "libr-68752.firebaseapp.com",
            projectId: "libr-68752",
            storageBucket: "libr-68752.firebasestorage.app",
            messagingSenderId: "395424150999",
            appId: "1:395424150999:web:d874350d01ae5c90a8c792"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Auth Logic
        document.getElementById('login-btn').addEventListener('click', async () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            try { await signInWithEmailAndPassword(auth, e, p); } 
            catch { document.getElementById('error-msg').innerText = "Access Denied."; }
        });

        onAuthStateChanged(auth, (u) => {
            document.getElementById('login-section').style.display = u ? 'none' : 'block';
            document.getElementById('dashboard-section').style.display = u ? 'block' : 'none';
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        // Update Live Status
        document.getElementById('update-status-btn').addEventListener('click', async () => {
            await setDoc(doc(db, "admin_config", "status"), {
                text: document.getElementById('status-input').value,
                color: document.getElementById('status-color').value
            }, { merge: true });
            alert("Status Live!");
        });

        // Publish Blog
        document.getElementById('publish-blog-btn').addEventListener('click', async () => {
            const t = document.getElementById('blog-title').value;
            const c = document.getElementById('blog-content').value;
            await addDoc(collection(db, "blogs"), {
                title: t,
                content: c,
                timestamp: serverTimestamp(),
                date: new Date().toLocaleDateString()
            });
            alert("Blog Published!");
            document.getElementById('blog-title').value = "";
            document.getElementById('blog-content').value = "";
        });
    </script>
</body>
</html>
