<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal | Harish</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="max-w-4xl mx-auto px-6 py-10 flex justify-between items-center">
        <a href="/" class="font-bold text-blue-600">← Portfolio</a>
        <div class="font-black italic text-xl">Journal.</div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 pb-20">
        <div id="blog-container" class="space-y-16">
            <p class="text-gray-400">Connecting to Firestore...</p>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { /* SAME AS ABOVE */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const container = document.getElementById('blog-container');

        // Real-time listener for new blogs
        const q = query(collection(db, "blogs"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            container.innerHTML = "";
            snapshot.forEach((doc) => {
                const b = doc.data();
                container.innerHTML += `
                    <article class="border-b pb-12">
                        <time class="text-xs font-mono text-blue-500 bg-blue-50 px-2 py-1 rounded">${b.date}</time>
                        <h2 class="text-3xl font-bold mt-4">${b.title}</h2>
                        <div class="mt-6 text-gray-700 leading-relaxed text-lg">${b.content}</div>
                    </article>
                `;
            });
        });
    </script>
</body>
</html>
